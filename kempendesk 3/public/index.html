<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KempenDesk Factcheck</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="label">Redactietool</p>
      <h1>KempenDesk Factcheck</h1>
      <p>Plak tekst, voeg eventueel een URL toe en laat de tekst journalistiek controleren.</p>
    </section>

    <section class="card">
      <label for="text">Tekst</label>
      <textarea id="text" placeholder="Plak hier je bericht, artikel, persbericht of ruwe tekst..."></textarea>

      <label for="url">URL optioneel</label>
      <input id="url" type="url" placeholder="https://voorbeeld.nl/artikel" />

      <div class="buttons">
        <button id="factcheck">Factcheck</button>
        <button id="questions" class="secondary">Stel vijf vragen</button>
      </div>
    </section>

    <section class="card result-card">
      <div class="result-head">
        <h2>Resultaat</h2>
        <button id="copy" class="ghost">Kopieer</button>
      </div>
      <pre id="result">Nog geen analyse uitgevoerd.</pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
